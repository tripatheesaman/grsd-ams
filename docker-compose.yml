services:
  db:
    container_name: grsd-ams-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /srv/grsd-ams/db:/var/lib/postgresql/data
    networks:
      - grsd_ams_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    container_name: grsd-ams-app
    image: tripatheesaman/grsd-ams:latest
    env_file:
      - ../config/.env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /srv/grsd-ams/uploads:/app/media/uploads
      - /srv/grsd-ams/logs:/app/logs
    ports:
      - "127.0.0.1:3006:3000"
    networks:
      - grsd_ams_network
    restart: unless-stopped

networks:
  grsd_ams_network:
    driver: bridge