services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-admin_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS_STRONG_PASSWORD}
    volumes:
      - /srv/grsd-ams/db:/var/lib/postgresql/data
    networks:
      - grsd_ams_network
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: tripatheesaman/grsd-ams:latest
    env_file:
      - ${PROD_ENV_FILE:-./env.production.example}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /srv/grsd-ams/uploads:/app/media/uploads
      - /srv/grsd-ams/logs:/app/logs
    ports:
      - "127.0.0.1:3006:3000"
    networks:
      - grsd_ams_network
    restart: unless-stopped

networks:
  grsd_ams_network:
    driver: bridge



