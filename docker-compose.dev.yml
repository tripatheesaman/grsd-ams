services:
  db:
    container_name: grsd-ams-db-dev
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-admin_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-Testing@123}
    volumes:
      - ./media/db-dev:/var/lib/postgresql/data
    networks:
      - grsd_ams_network
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-admin_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    container_name: grsd-ams-app-dev
    build: .
    env_file:
      - .env.development
    environment:
      NODE_ENV: production
      APP_ORIGIN: http://localhost:3000
      TEST_BUILD: ${TEST_BUILD:-0}
      PORT: 3000
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-Testing@123}@db:5432/${DATABASE_NAME:-admin_db}?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media/uploads:/app/media/uploads
      - ./media/processed:/app/media/processed
      - ./media/staging:/app/media/staging
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - grsd_ams_network
    command: sh -c 'node server.js'
    restart: unless-stopped

networks:
  grsd_ams_network:
    driver: bridge
