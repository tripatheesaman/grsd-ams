name: Build & Push (Dev)

on:
  push:
    branches: [ "dev" ]

jobs:
  build:
    name: CI - Docker build (dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          docker build -t tripatheesaman/grsd-ams:dev .
          docker push tripatheesaman/grsd-ams:dev